version: "3.9"

services:
  api:
    build: .
    container_name: node-api
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: mongo-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: